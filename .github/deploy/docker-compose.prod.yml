version: '3.8'

services:
  client:
    image: ${IMAGE_URI}:latest
    container_name: mcp-coop-next-react
    restart: always
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      setup-db:
        condition: service_completed_successfully

  setup-db:
    image: ${IMAGE_URI}:latest
    container_name: mcp-coop-setup-db
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx prisma db seed"

  postgres:
    image: postgres:16
    container_name: mcp-coop-postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${EXTERNAL_DB_PORT:-5001}:5001"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
