name: Deploy to GCP VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: 'project-ad4d3791-fa38-4a8b-9cc'
  REGION: 'europe-central2'
  REPO_NAME: 'mcp-coop-artifacts'
  IMAGE_NAME: 'mcp-coop-platform'
  GAR_LOCATION: 'europe-central2-docker.pkg.dev'

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud without JSON keys (WIF)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: 'mcp-coop-github-actions@project-ad4d3791-fa38-4a8b-9cc.iam.gserviceaccount.com' 

      # 2. Configure Docker for Google Artifact Registry
      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${GAR_LOCATION} --quiet

      # 3. Build and Push 
      - name: Build and Push Docker Image
        run: |
          IMAGE_URI="${GAR_LOCATION}/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}"
          # We pass environment variables for Next.js build time here
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_KANBAN_MFE_URL=${{ secrets.NEXT_PUBLIC_KANBAN_MFE_URL }} \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:${{ github.sha }} \
            .
          
          # Build specifically the 'builder' stage for Prisma migrations
          docker build \
            --target builder \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_KANBAN_MFE_URL=${{ secrets.NEXT_PUBLIC_KANBAN_MFE_URL }} \
            -t $IMAGE_URI-builder:latest \
            -t $IMAGE_URI-builder:${{ github.sha }} \
            .

          # Push the runner (web application) image
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}
          
          # Push the builder (backend scripts) image
          docker push $IMAGE_URI-builder:latest
          docker push $IMAGE_URI-builder:${{ github.sha }}

  deploy-to-vm:
    name: Deploy to VM via SSH
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Copy the production docker-compose file to the VM root
      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".github/deploy/docker-compose.prod.yml"
          target: "~/"
          strip_components: 2

      # 1.5. Copy Nginx template to the VM root
      - name: Copy Nginx Config via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx.conf.template"
          target: "~/"

      # 2. Execute SSH commands to update and restart containers
      - name: Run Deploy scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          CLOUDFLARE_SSL_CERT: ${{ secrets.CLOUDFLARE_SSL_CERT }}
          CLOUDFLARE_SSL_KEY: ${{ secrets.CLOUDFLARE_SSL_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GAR_LOCATION, PROJECT_ID, REPO_NAME, IMAGE_NAME, VPS_HOST, CLOUDFLARE_SSL_CERT, CLOUDFLARE_SSL_KEY, NEXTAUTH_URL
          script: |
            set -e # Make the script fail immediately if any command fails, so GitHub shows the RED error!

            # Compute full image URI
            export IMAGE_URI="${GAR_LOCATION}/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}"
            
            # Navigate to the root directory
            cd ~/

            # --- ENV SETUP ---
            mv .env.prod .env || touch .env

            # --- SSL CERTIFICATES SETUP ---
            # Создаем папку certs и безопасно записываем сертификаты из секретов GitHub
            mkdir -p certs
            echo "$CLOUDFLARE_SSL_CERT" > certs/cert.pem
            echo "$CLOUDFLARE_SSL_KEY" > certs/key.pem
            chmod 600 certs/key.pem

            # Dynamically inject or overwrite NEXTAUTH_URL into the .env file 
            # using the NEXTAUTH_URL secret and hardcoded 80 port for container routing
            sed -i '/^NEXTAUTH_URL=/d' .env || true
            sed -i '/^PORT=/d' .env || true
            echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env
            echo "PORT=80" >> .env

            # Configure Docker auth on the VM using the VM's default service account
            gcloud auth configure-docker ${GAR_LOCATION} --quiet || true

            # Rename config for standard convenience
            mv docker-compose.prod.yml docker-compose.yml

            # Pull the new image and recreate containers using modern syntax
            IMAGE_URI=${IMAGE_URI} docker compose pull
            IMAGE_URI=${IMAGE_URI} docker compose up -d

            # Clean up old images to explicitly save disk space
            docker image prune -a -f
