version: '3.8'

services:
  postgres-platform:
    image: postgres:16
    container_name: mcp-coop-platform-db-local
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${MCP_COOP_PLARFORM:-postgres}
      POSTGRES_PASSWORD: ${MCP_COOP_PLARFORM_PASSWORD:-CHANGE_ME}
      POSTGRES_DB: ${MCP_COOP_PLARFORM_DB:-mcp_coop_platform}
    ports:
      - "5435:5432"
    volumes:
      - mcp_platform_postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mcp-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: mcp-coop-platform-app-local
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - INTERNAL_API_URL=http://mcp-coop-backend-app-local:3001/api
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_KANBAN_MFE_URL=http://localhost:8081/kanban-mfe.js
      - DATABASE_URL=postgresql://${MCP_COOP_PLARFORM:-postgres}:${MCP_COOP_PLARFORM_PASSWORD:-CHANGE_ME}@mcp-coop-platform-db-local:5432/${MCP_COOP_PLARFORM_DB:-mcp_coop_platform}?schema=public
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma generate && npx next dev -p 3000"
    depends_on:
      setup-db:
        condition: service_completed_successfully
    networks:
      - mcp-network

  setup-db:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: mcp-coop-platform-setup-db-local
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://${MCP_COOP_PLARFORM:-postgres}:${MCP_COOP_PLARFORM_PASSWORD:-CHANGE_ME}@mcp-coop-platform-db-local:5432/${MCP_COOP_PLARFORM_DB:-mcp_coop_platform}?schema=public
    depends_on:
      postgres-platform:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate && npx prisma db push --accept-data-loss && npx prisma db seed"
    networks:
      - mcp-network

volumes:
  mcp_platform_postgres_data_local:

networks:
  mcp-network:
    name: mcp-network
    external: true
