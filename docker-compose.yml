version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
    # Имя контейнера берется из .env, либо используется дефолтное mcp-coop-client
    container_name: ${COMPOSE_PROJECT_NAME:-mcp-coop-client}-next-react
    restart: always
    ports:
      # Пробрасываем порт из переменной окружения
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: ${COMPOSE_PROJECT_NAME:-mcp-coop-client}-postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${EXTERNAL_DB_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
