version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: mcp-coop-nginx
    restart: always
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - client
    networks:
      - mcp-network

  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_KANBAN_MFE_URL=${NEXT_PUBLIC_KANBAN_MFE_URL}
    # Имя контейнера берется из .env, либо используется дефолтное mcp-coop-client
    container_name: ${PLATFORM_CONTAINER_NAME:-mcp-coop-next-react}
    restart: always
    # Убран маппинг портов наружу, доступ только через nginx
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      setup-db:
        condition: service_completed_successfully
    networks:
      - mcp-network

  setup-db:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ${PLATFORM_CONTAINER_NAME:-mcp-coop-next-react}-setup-db
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx prisma db seed"
    networks:
      - mcp-network

  postgres:
    image: postgres:16
    container_name: ${COMPOSE_PROJECT_NAME:-mcp-coop}-postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${EXTERNAL_DB_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mcp-network

volumes:
  postgres_data:

networks:
  mcp-network:
    name: mcp-network
